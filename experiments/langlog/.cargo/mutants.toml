test_workspace = true
timeout_multiplier = 2.0
minimum_test_timeout = 5.0
output = ".mutants.out"
additional_cargo_test_args = ["requirement_"]
examine_globs = [
    "crates/*/src/**/*.rs",
]
exclude_re = [
    # `advance_char` is the lexer progress primitive. Mutating it directly only
    # proves that byte advancement is required and otherwise produces timeout
    # noise; lexer behavior is covered through the token/comment/literal tests.
    "crates/langlog-syntax/src/lexer.rs:[0-9]+:[0-9]+: replace Lexer::advance_char -> Option<char>",
    "crates/langlog-syntax/src/lexer.rs:[0-9]+:[0-9]+: replace \\+= with (-=|\\*=) in Lexer::advance_char",
    # This fallback advances after a no-progress lexer iteration so mutation-broken
    # token handlers cannot spin. Arithmetic mutations here are equivalent timeout
    # guards, not requirement behavior.
    "crates/langlog-syntax/src/lexer.rs:[0-9]+:[0-9]+: replace \\+= with (-=|\\*=) in Lexer::lex",
    # Parser synchronization helpers are recovery plumbing. Mutating them directly
    # mainly removes or corrupts panic/timeout protection; recovery requirements
    # assert the observable behavior at malformed item/statement/list boundaries.
    "crates/langlog-syntax/src/parser.rs:[0-9]+:[0-9]+: replace Parser<'a>::synchronize_(item|statement|expression_list_item|match_arm) with \\(\\)",
    "crates/langlog-syntax/src/parser.rs:[0-9]+:[0-9]+: delete ! in Parser<'a>::synchronize_(item|statement|expression_list_item|match_arm)",
    "crates/langlog-syntax/src/parser.rs:[0-9]+:[0-9]+: replace && with \\|\\| in Parser<'a>::synchronize_match_arm",
    # `ensure_progress` is a parser no-progress guard used after recovery paths.
    # Its direct mutants either duplicate timeout checks or create artificial
    # cursor loops; recovery tests cover the user-visible diagnostics and resume
    # behavior.
    "crates/langlog-syntax/src/parser.rs:[0-9]+:[0-9]+: replace Parser<'a>::ensure_progress -> bool",
    "crates/langlog-syntax/src/parser.rs:[0-9]+:[0-9]+: replace \\+= with (-=|\\*=) in Parser<'a>::ensure_progress",
    # `bump` is the parser cursor-advance primitive. Directly mutating advancement
    # creates parser-wide infinite loops rather than meaningful requirement gaps.
    "crates/langlog-syntax/src/parser.rs:[0-9]+:[0-9]+: replace Parser<'a>::bump -> Token",
    "crates/langlog-syntax/src/parser.rs:[0-9]+:[0-9]+: delete ! in Parser<'a>::bump",
    "crates/langlog-syntax/src/parser.rs:[0-9]+:[0-9]+: replace \\+= with (-=|\\*=) in Parser<'a>::bump",
    # Native mutation testing cannot inspect wasm `JsValue` conversion shells
    # directly; pure adapter result models cover the same observable summaries.
    "crates/langlog-playground-wasm/src/lib.rs:[0-9]+:[0-9]+: replace (check|build|build_and_run_ready) -> JsValue",
    "crates/langlog-playground-wasm/src/lib.rs:[0-9]+:[0-9]+: replace PlaygroundResult::into_js",
]
